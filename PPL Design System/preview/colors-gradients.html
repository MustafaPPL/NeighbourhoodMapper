<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);background:var(--cream)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g{height:66px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px 12px;color:#fff;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;box-shadow:var(--shadow-sm)}
.g1{background:var(--grad-wave-primary)}
.g2{background:var(--grad-wave-deep)}
.g3{background:var(--grad-wave-soft);color:var(--ppl)}
.note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}
.note b{color:var(--ppl)}
</style></head><body>
<div class="grid">
  <div class="g g1">Primary → Mid</div>
  <div class="g g2">Primary → Deep</div>
  <div class="g g3">Soft → Lilac</div>
</div>
<div class="note"><b>Rule:</b> gradients are used <b>only inside wave motifs</b>. Never on buttons, cards, or text.</div>
</body></html>
