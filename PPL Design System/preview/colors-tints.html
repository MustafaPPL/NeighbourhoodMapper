<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);background:var(--cream)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sw{padding:12px;border-radius:var(--radius-md);height:92px;display:flex;align-items:flex-end;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.sw .tag{line-height:1.1}
.n{font-weight:700;font-size:12px}
.h{font-size:11px;font-family:ui-monospace,monospace;opacity:.7}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:var(--ppl-tint-1)"><div class="tag"><div class="n">Tint 1</div><div class="h">#D2C4DC</div></div></div>
  <div class="sw" style="background:var(--ppl-tint-2)"><div class="tag"><div class="n">Tint 2</div><div class="h">#EDE7F1</div></div></div>
  <div class="sw" style="background:var(--ppl-tint-3)"><div class="tag"><div class="n">Tint 3</div><div class="h">#F2EFFF</div></div></div>
  <div class="sw" style="background:var(--cream)"><div class="tag"><div class="n">Cream (app bg)</div><div class="h">#FAF6FD</div></div></div>
  <div class="sw" style="background:var(--paper)"><div class="tag"><div class="n">Paper</div><div class="h">#FFFFFF</div></div></div>
  <div class="sw" style="background:var(--line)"><div class="tag"><div class="n">Line</div><div class="h">#EAE3F0</div></div></div>
</div>
</body></html>
