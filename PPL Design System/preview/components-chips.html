<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);background:var(--cream)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-md);padding:12px 14px;font-size:13px;font-weight:500;color:var(--ink);box-shadow:var(--shadow-sm);cursor:pointer;transition:all 150ms var(--ease);text-align:left}
.chip:hover{border-color:var(--ppl-tint-1);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.chip .eye{display:block;font-size:9.5px;color:var(--ppl-mid);font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px}
</style></head><body>
<div class="grid">
  <div class="chip"><span class="eye">Policy</span>Voids recovery — relet targets</div>
  <div class="chip"><span class="eye">Legislation</span>Duty to refer under HRA</div>
  <div class="chip"><span class="eye">Finance</span>Eligible service charges</div>
  <div class="chip"><span class="eye">Evaluation</span>Move-on pathway patterns</div>
</div>
</body></html>
