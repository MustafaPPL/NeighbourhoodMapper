<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{font-family:var(--font-body);background:var(--cream);padding:14px 16px}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{height:92px;border-radius:var(--radius-md);padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm);color:#fff}
.sw .n{font-weight:700;font-size:12.5px;line-height:1.1}
.sw .r{font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.8;font-weight:600}
.sw .h{font-family:ui-monospace,monospace;font-size:11px;opacity:.92}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--success)">
    <div><div class="r">Success</div><div class="n">Ready · Saved</div></div>
    <div class="h">#5AA36D</div>
  </div>
  <div class="sw" style="background:var(--warning)">
    <div><div class="r">Warning</div><div class="n">Heads-up</div></div>
    <div class="h">#D9A24A</div>
  </div>
  <div class="sw" style="background:var(--danger)">
    <div><div class="r">Danger</div><div class="n">Error · Destructive</div></div>
    <div class="h">#C04A3F</div>
  </div>
  <div class="sw" style="background:var(--info)">
    <div><div class="r">Info</div><div class="n">Neutral callout</div></div>
    <div class="h">#3F6FC0</div>
  </div>
</div>
</body></html>
