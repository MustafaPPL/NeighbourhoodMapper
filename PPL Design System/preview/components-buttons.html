<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;font-family:var(--font-body);background:var(--cream);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn{border:0;cursor:pointer;font-family:inherit;font-weight:600;transition:all 150ms var(--ease)}
.primary{background:var(--ppl);color:#fff;padding:10px 18px;border-radius:var(--radius-pill);font-size:13px;box-shadow:var(--shadow-sm)}
.primary:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);background:var(--ppl-deep)}
.secondary{background:var(--paper);color:var(--ppl);padding:10px 18px;border-radius:var(--radius-pill);font-size:13px;border:1px solid var(--line-strong)}
.secondary:hover{background:var(--ppl-tint-3);border-color:var(--ppl)}
.lilac{background:var(--ppl-lilac);color:#fff;padding:8px 14px;border-radius:var(--radius-pill);font-size:12px;display:inline-flex;align-items:center;gap:6px}
.ghost{background:transparent;color:var(--ppl);padding:10px 14px;border-radius:var(--radius-pill);font-size:13px}
.ghost:hover{background:var(--ppl-tint-2)}
.icon{background:var(--paper);color:var(--ink-2);width:36px;height:36px;border-radius:10px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center}
.icon:hover{background:var(--ppl-tint-3);color:var(--ppl);border-color:var(--ppl-tint-2)}
.icon svg{width:18px;height:18px}
</style></head><body>
<button class="btn primary">Ask PPL Knowledge</button>
<button class="btn secondary">Cancel</button>
<button class="btn ghost">Learn more</button>
<span class="btn lilac">
  <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9"/><path d="M3 12a9 9 0 0 1 9-9"/><path d="M21 3v6h-6"/><path d="M3 21v-6h6"/></svg>
  Sync now
</span>
<button class="btn icon" aria-label="Attach">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
</button>
</body></html>
