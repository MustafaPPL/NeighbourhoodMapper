<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);background:var(--cream);display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:14px}
.tok{width:var(--w);height:28px;background:var(--ppl);border-radius:4px;flex:none}
.lbl{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:600;width:58px;flex:none}
.v{font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2);margin-left:auto}
</style></head><body>
<div class="row"><div class="lbl">1</div><div class="tok" style="--w:4px"></div><div class="v">4px</div></div>
<div class="row"><div class="lbl">2</div><div class="tok" style="--w:8px"></div><div class="v">8px</div></div>
<div class="row"><div class="lbl">3</div><div class="tok" style="--w:12px"></div><div class="v">12px</div></div>
<div class="row"><div class="lbl">4</div><div class="tok" style="--w:16px"></div><div class="v">16px</div></div>
<div class="row"><div class="lbl">5</div><div class="tok" style="--w:20px"></div><div class="v">20px</div></div>
<div class="row"><div class="lbl">6</div><div class="tok" style="--w:24px"></div><div class="v">24px</div></div>
<div class="row"><div class="lbl">7</div><div class="tok" style="--w:32px"></div><div class="v">32px</div></div>
<div class="row"><div class="lbl">8</div><div class="tok" style="--w:48px"></div><div class="v">48px</div></div>
<div class="row"><div class="lbl">9</div><div class="tok" style="--w:64px"></div><div class="v">64px</div></div>
</body></html>
