<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px;font-family:var(--font-body);background:var(--cream);display:flex;gap:28px;align-items:center;justify-content:center}
.block{text-align:center}
.purple{width:140px;height:58px;background:url('../assets/ppl-logo.png') no-repeat center/contain}
.white-wrap{background:var(--ppl);padding:16px 18px;border-radius:var(--radius-md)}
.white{width:140px;height:58px;background:url('../assets/ppl-logo-white.png') no-repeat center/contain}
.lbl{margin-top:10px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600}
</style></head><body>
<div class="block"><div class="purple"></div><div class="lbl">On light</div></div>
<div class="block"><div class="white-wrap"><div class="white"></div></div><div class="lbl">On dark</div></div>
</body></html>
