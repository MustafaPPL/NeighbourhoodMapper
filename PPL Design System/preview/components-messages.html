<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);background:var(--cream)}
.col{display:flex;flex-direction:column;gap:10px;max-width:520px}

.u{align-self:flex-end;background:var(--ppl-tint-3);color:var(--ink);border-bottom-right-radius:6px;max-width:80%}

      <span class="c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Scheme Mgmt · Appendix C</span>
