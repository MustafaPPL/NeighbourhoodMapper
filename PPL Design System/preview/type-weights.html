<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

.w .lbl{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-weight:600;margin-top:6px;letter-spacing:.16em}
</style></head><body>
<div class="row">
  <div class="w" style="font-weight:300">Aa<span class="lbl">Light 300</span></div>
  <div class="w" style="font-weight:400">Aa<span class="lbl">Regular 400</span></div>
  <div class="w" style="font-weight:500">Aa<span class="lbl">Medium 500</span></div>
  <div class="w" style="font-weight:600">Aa<span class="lbl">Semi 600</span></div>
  <div class="w" style="font-weight:700">Aa<span class="lbl">Bold 700</span></div>
  <div class="w" style="font-weight:800">Aa<span class="lbl">Extra 800</span></div>
</div>
</body></html>
