<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);background:var(--cream)}
.composer{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:14px}
textarea{width:100%;border:0;outline:0;font-family:inherit;font-size:14.5px;resize:none;min-height:52px;color:var(--ink)}
textarea::placeholder{color:var(--muted)}
.row{display:flex;align-items:center;gap:8px;margin-top:8px}
.mini{display:inline-flex;align-items:center;gap:6px;background:var(--ppl-tint-3);border:0;color:var(--ppl);font-size:11.5px;padding:6px 10px;border-radius:999px;font-weight:600;cursor:pointer}
.mini svg{width:12px;height:12px}
.mini.active{background:var(--ppl);color:#fff}
.sendgroup{margin-left:auto;display:inline-flex;align-items:center;gap:8px}
.send{width:34px;height:34px;border-radius:50%;background:var(--ppl);color:#fff;border:0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.send svg{width:14px;height:14px}
.hint{font-size:10.5px;color:var(--muted)}
kbd{font-family:ui-monospace,monospace;font-size:10px;background:var(--line);color:var(--ink-2);padding:1px 5px;border-radius:3px;font-weight:600}
</style></head><body>
<div class="composer">
  <textarea placeholder="Ask a question, paste a document, or describe what you need…"></textarea>
  <div class="row">
    <button class="mini"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>Attach</button>
    <button class="mini active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>With citations</button>
    <div class="sendgroup">
      <span class="hint"><kbd>↵</kbd> to send</span>
      <button class="send" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
    </div>
  </div>
</div>
</body></html>
