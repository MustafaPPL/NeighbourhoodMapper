<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;font-family:var(--font-body);background:var(--cream)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.b{background:var(--paper);border-radius:var(--radius-lg);padding:20px 16px;display:flex;flex-direction:column;justify-content:flex-end;min-height:110px}
.t{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:600;margin-bottom:4px}
.v{font-family:ui-monospace,monospace;font-size:10.5px;color:var(--ink-2);opacity:.8;line-height:1.4}
.s-sm{box-shadow:var(--shadow-sm)}
.s-md{box-shadow:var(--shadow-md)}
.s-lg{box-shadow:var(--shadow-lg)}
</style></head><body>
<div class="grid">
  <div class="b s-sm"><div class="t">Shadow SM</div><div class="v">Chips, small cards</div></div>
  <div class="b s-md"><div class="t">Shadow MD</div><div class="v">Composer, message cards</div></div>
  <div class="b s-lg"><div class="t">Shadow LG</div><div class="v">Modals, focus overlays</div></div>
</div>
</body></html>
