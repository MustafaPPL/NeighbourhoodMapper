<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{margin:0;padding:14px 18px;font-family:var(--font-body);background:var(--cream);color:var(--ink)}
.stack{display:grid;gap:10px}
.r{display:flex;align-items:baseline;gap:14px}
.r .label{width:88px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-weight:600;flex:none}
.d1{font-family:var(--font-display);font-weight:800;font-size:56px;line-height:1;letter-spacing:-.025em;color:var(--ppl)}
.d2{font-family:var(--font-display);font-weight:700;font-size:38px;line-height:1.1;letter-spacing:-.02em;color:var(--ink)}
.d3{font-family:var(--font-display);font-weight:700;font-size:24px;line-height:1.15;letter-spacing:-.01em;color:var(--ink)}
.d4{font-family:var(--font-display);font-weight:600;font-size:18px;line-height:1.2;color:var(--ink)}
</style></head><body>
<div class="stack">
  <div class="r"><div class="label">Display · 56</div><div class="d1">Partnership.</div></div>
  <div class="r"><div class="label">H1 · 38</div><div class="d2">Knowledge, grounded.</div></div>
  <div class="r"><div class="label">H2 · 24</div><div class="d3">A consultancy with a difference</div></div>
  <div class="r"><div class="label">H3 · 18</div><div class="d4">Section heading</div></div>
</div>
</body></html>
