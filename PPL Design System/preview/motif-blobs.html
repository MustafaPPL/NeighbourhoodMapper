<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body);
  background:var(--cream);
  padding:16px 18px;
  min-height:170px;
  display:flex;
  align-items:center;
  gap:22px;
}
.pair{
  flex:none;
  width:380px;
  height:150px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.cell{
  position:relative;
  border-radius:var(--radius-md);
  overflow:hidden;
  display:grid;
  place-items:center;
}
.cell.light{background:#FFFFFF;border:1px solid var(--line)}
.cell.dark{background:var(--ppl-deep)}
.cell img{
  width:88%;
  height:auto;
  max-height:118px;
  object-fit:contain;
}
.cell .tag{
  position:absolute;
  bottom:6px;
  left:8px;
  font-size:9px;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:600;
}
.cell.light .tag{color:var(--muted)}
.cell.dark .tag{color:rgba(255,255,255,.7)}
.legend{line-height:1.5}
.legend .eye{font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--ppl-mid);margin-bottom:6px}
.legend .t{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink);margin-bottom:4px}
.legend .d{font-size:11.5px;color:var(--ink-2);max-width:260px}
</style></head><body>
<div class="pair">
  <div class="cell light">
    <img src="../assets/blob-1.png" alt="Overlapping organic blobs"/>
    <div class="tag">On paper</div>
  </div>
  <div class="cell dark">
    <img src="../assets/blob-2.png" alt="Stacked pebble blob"/>
    <div class="tag">On purple</div>
  </div>
</div>
<div class="legend">
  <div class="eye">Signature motif</div>
  <div class="t">Organic blobs</div>
  <div class="d">Flat, overlapping pebble shapes in lilac tones. Used as background anchors behind headlines, photos, or number callouts — never blurred, never gradient-filled.</div>
</div>
</body></html>
