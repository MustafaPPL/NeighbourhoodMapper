<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{font-family:var(--font-body);background:var(--cream);padding:14px 16px}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{height:92px;border-radius:var(--radius-md);padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm);color:#fff}
.sw .n{font-weight:700;font-size:12.5px;line-height:1.1}
.sw .r{font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.75;font-weight:600}
.sw .h{font-family:ui-monospace,monospace;font-size:11px;opacity:.88}
.dark{color:var(--ink)}
.dark .r{opacity:.7}
.dark .h{opacity:1;color:var(--ink-2)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--ppl-deep)">
    <div><div class="r">Deep</div><div class="n">Deep purple</div></div>
    <div class="h">#350355</div>
  </div>
  <div class="sw" style="background:var(--ppl)">
    <div><div class="r">Primary</div><div class="n">PPL purple</div></div>
    <div class="h">#490E6F</div>
  </div>
  <div class="sw" style="background:var(--ppl-mid)">
    <div><div class="r">Mid</div><div class="n">Mid purple</div></div>
    <div class="h">#724CBF</div>
  </div>
  <div class="sw dark" style="background:var(--ppl-lilac)">
    <div><div class="r">Accent</div><div class="n">Lilac</div></div>
    <div class="h">#9576FF</div>
  </div>
</div>
</body></html>
