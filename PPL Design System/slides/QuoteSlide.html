<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>PPL Quote Slide</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
html,body{margin:0;padding:0;background:#350355;height:100%;overflow:hidden}
.stage{position:fixed;inset:0;display:grid;place-items:center;background:#350355}
.slide{
  width:1280px;height:720px;
  background:var(--ppl-deep);
  color:#fff;
  position:relative;
  overflow:hidden;
  transform-origin:center center;
  font-family:var(--font-body);
}
/* Blob atmosphere — low-opacity organic shapes, not in foreground */
.blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
.b1{width:540px;height:540px;background:var(--ppl-lilac);opacity:.28;top:-180px;right:-140px}
.b2{width:420px;height:420px;background:var(--ppl-mid);opacity:.35;bottom:-160px;left:-120px}
.ppl-mark{position:absolute;top:44px;left:80px;font-family:var(--font-display);font-weight:800;font-size:34px;color:#fff;line-height:1;letter-spacing:-.02em}
.content{position:absolute;inset:0;display:grid;place-items:center;padding:120px 140px;z-index:2}
.quote-mark{font-family:var(--font-display);font-size:200px;font-weight:800;color:var(--ppl-lilac);line-height:.7;position:absolute;left:110px;top:180px;opacity:.9}
.quote{font-family:var(--font-display);font-weight:600;font-size:52px;line-height:1.15;color:#fff;letter-spacing:-.018em;max-width:980px;text-align:center;text-wrap:balance;margin:0;position:relative;z-index:2}
.attribution{margin-top:44px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:2}
.a-name{font-size:18px;font-weight:600;color:#fff}
.a-role{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ppl-lilac);font-weight:600}
.footer{position:absolute;left:80px;right:80px;bottom:32px;display:flex;justify-content:space-between;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:600}
</style>
</head>
<body>
<div class="stage">
  <div class="slide" id="slide">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="ppl-mark">PPL</div>
    <div class="quote-mark" aria-hidden="true">"</div>
    <div class="content">
      <div>
        <p class="quote">"Partnership isn't a posture. It's a practice — shared data, shared decisions, shared accountability for what actually happens on the street."</p>
        <div class="attribution">
          <div class="a-name">Dame Sandie Keene</div>
          <div class="a-role">Chair · Integrated Care Partnership</div>
        </div>
      </div>
    </div>
    <div class="footer"><span>B Corp · Social Enterprise UK · FT Leading Consultancy 2025</span><span>12 / 24</span></div>
  </div>
</div>
<script>
function fit(){
  const s = document.getElementById('slide');
  const k = Math.min(innerWidth/1280, innerHeight/720);
  s.style.transform = `scale(${k})`;
}
addEventListener('resize', fit); fit();
</script>
</body>
</html>
